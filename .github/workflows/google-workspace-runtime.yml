name: Google Workspace Runtime Repair

# Idempotently restores all managed Google runtime clients and skills after every
# successful Hermes deploy. Existing OAuth tokens and Drive state are preserved.
on:
  workflow_run:
    workflows:
      - Deploy Hermes Agent
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: hermes-infra
  cancel-in-progress: false

jobs:
  repair:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Resolve configuration
        id: cfg
        run: |
          set -euo pipefail
          PROJECT_ID="${{ vars.GCP_PROJECT_ID }}"
          if [ -z "${PROJECT_ID}" ]; then
            PROJECT_ID="$(jq -r '.project_id' "${GOOGLE_APPLICATION_CREDENTIALS}")"
          fi
          [ -n "${PROJECT_ID}" ] && [ "${PROJECT_ID}" != "null" ] || {
            echo "Could not resolve project_id" >&2
            exit 1
          }

          ZONE="${{ vars.GCP_ZONE }}"; ZONE="${ZONE:-us-central1-a}"
          VM_NAME="${{ vars.GCP_VM_NAME }}"; VM_NAME="${VM_NAME:-hermes-agent}"
          HERMES_USER="${{ vars.HERMES_USER }}"; HERMES_USER="${HERMES_USER:-hermes}"
          HERMES_USER_HOME="${{ vars.HERMES_HOME }}"; HERMES_USER_HOME="${HERMES_USER_HOME:-/home/hermes}"

          {
            echo "project_id=${PROJECT_ID}"
            echo "zone=${ZONE}"
            echo "vm_name=${VM_NAME}"
            echo "hermes_user=${HERMES_USER}"
            echo "hermes_user_home=${HERMES_USER_HOME}"
            echo "hermes_config_dir=${HERMES_USER_HOME}/.hermes"
          } >> "${GITHUB_OUTPUT}"

      - name: Ensure Google APIs
        run: |
          set -euo pipefail
          gcloud services enable \
            gmail.googleapis.com \
            calendar-json.googleapis.com \
            drive.googleapis.com \
            docs.googleapis.com \
            sheets.googleapis.com \
            people.googleapis.com \
            --project="${{ steps.cfg.outputs.project_id }}"

      - name: Establish ephemeral SSH over IAP
        id: ssh
        env:
          VM_NAME: ${{ steps.cfg.outputs.vm_name }}
          ZONE: ${{ steps.cfg.outputs.zone }}
          PROJECT_ID: ${{ steps.cfg.outputs.project_id }}
        run: |
          set -euo pipefail
          chmod +x scripts/*.sh
          ENV_FILE="$(scripts/ssh-iap.sh up)"
          echo "env_file=${ENV_FILE}" >> "${GITHUB_OUTPUT}"

      - name: Install and verify managed Google runtimes
        env:
          HERMES_USER: ${{ steps.cfg.outputs.hermes_user }}
          HERMES_USER_HOME: ${{ steps.cfg.outputs.hermes_user_home }}
          HERMES_CONFIG_DIR: ${{ steps.cfg.outputs.hermes_config_dir }}
        run: |
          set -euo pipefail
          # shellcheck disable=SC1090
          source "${{ steps.ssh.outputs.env_file }}"
          SSH="ssh -i ${SSH_KEY} -p ${SSH_PORT} ${SSH_OPTS} ${SSH_USER}@localhost"
          SCP="scp -i ${SSH_KEY} -P ${SSH_PORT} ${SSH_OPTS}"

          for i in $(seq 1 30); do
            if ${SSH} true 2>/dev/null; then break; fi
            [ "${i}" = "30" ] && { echo "VM SSH not ready"; exit 1; }
            sleep 5
          done

          ${SSH} 'sudo rm -rf /tmp/hermes-google-runtime && install -d -m 0700 /tmp/hermes-google-runtime/google-workspace-skill /tmp/hermes-google-runtime/google-contacts-skill'
          ${SCP} scripts/google-workspace-oauth.py \
                 scripts/google-workspace-api.py \
                 scripts/google-drive-oauth.py \
                 scripts/google-drive-workspace.py \
                 scripts/google-contacts-oauth.py \
                 scripts/google-contacts-api.py \
                 scripts/hermes-google-workspace.sh \
                 scripts/hermes-google-api.sh \
                 scripts/hermes-google-drive.sh \
                 scripts/hermes-google-contacts.sh \
                 scripts/install-google-workspace.sh \
                 scripts/install-google-contacts.sh \
                 "${SSH_USER}@localhost:/tmp/hermes-google-runtime/"
          ${SCP} skills/google-workspace/SKILL.md \
                 "${SSH_USER}@localhost:/tmp/hermes-google-runtime/google-workspace-skill/SKILL.md"
          ${SCP} skills/google-contacts/SKILL.md \
                 "${SSH_USER}@localhost:/tmp/hermes-google-runtime/google-contacts-skill/SKILL.md"

          ${SSH} "sudo env \
            HERMES_USER='${HERMES_USER}' \
            HERMES_USER_HOME='${HERMES_USER_HOME}' \
            HERMES_CONFIG_DIR='${HERMES_CONFIG_DIR}' \
            SKILL_SOURCE='/tmp/hermes-google-runtime/google-workspace-skill/SKILL.md' \
            API_SOURCE='/tmp/hermes-google-runtime/google-workspace-api.py' \
            DRIVE_SOURCE='/tmp/hermes-google-runtime/google-drive-workspace.py' \
            DRIVE_OAUTH_SOURCE='/tmp/hermes-google-runtime/google-drive-oauth.py' \
            bash /tmp/hermes-google-runtime/install-google-workspace.sh"

          ${SSH} "sudo env \
            HERMES_USER='${HERMES_USER}' \
            HERMES_USER_HOME='${HERMES_USER_HOME}' \
            HERMES_CONFIG_DIR='${HERMES_CONFIG_DIR}' \
            CONTACTS_OAUTH_SOURCE='/tmp/hermes-google-runtime/google-contacts-oauth.py' \
            CONTACTS_API_SOURCE='/tmp/hermes-google-runtime/google-contacts-api.py' \
            CONTACTS_SKILL_SOURCE='/tmp/hermes-google-runtime/google-contacts-skill/SKILL.md' \
            bash /tmp/hermes-google-runtime/install-google-contacts.sh"

          ${SSH} 'sudo systemctl restart hermes-agent.service'

          ACTIVE_API="${HERMES_CONFIG_DIR}/skills/productivity/google-workspace/scripts/google_api.py"
          ACTIVE_DRIVE="${HERMES_CONFIG_DIR}/skills/productivity/google-workspace/scripts/google_drive.py"
          ACTIVE_CONTACTS="${HERMES_CONFIG_DIR}/skills/productivity/google-contacts/scripts/google_contacts.py"
          ${SSH} "sudo -u '${HERMES_USER}' test -x '${ACTIVE_API}'"
          ${SSH} "sudo -u '${HERMES_USER}' test -x '${ACTIVE_DRIVE}'"
          ${SSH} "sudo -u '${HERMES_USER}' test -x '${ACTIVE_CONTACTS}'"
          ${SSH} "sudo -u '${HERMES_USER}' grep -q 'Dependency-free Gmail' '${ACTIVE_API}'"
          ${SSH} "sudo -u '${HERMES_USER}' grep -q 'direct children of one app-owned Drive folder' '${ACTIVE_DRIVE}'"
          ${SSH} "sudo -u '${HERMES_USER}' grep -q 'Google Contacts CLI' '${ACTIVE_CONTACTS}'"

          if ${SSH} "sudo -u '${HERMES_USER}' test -f '${HERMES_CONFIG_DIR}/google_token.json'"; then
            ${SSH} "sudo -u '${HERMES_USER}' env \
              HOME='${HERMES_USER_HOME}' \
              HERMES_HOME='${HERMES_CONFIG_DIR}' \
              HERMES_CONFIG_DIR='${HERMES_CONFIG_DIR}' \
              /usr/bin/python3 '${ACTIVE_API}' check"
            ${SSH} "sudo -u '${HERMES_USER}' env \
              HOME='${HERMES_USER_HOME}' \
              HERMES_HOME='${HERMES_CONFIG_DIR}' \
              HERMES_CONFIG_DIR='${HERMES_CONFIG_DIR}' \
              /usr/bin/python3 '${ACTIVE_API}' gmail labels >/dev/null"
            echo "AGENT_RUNTIME_READY_STDLIB: Gmail and Calendar checks passed."
          else
            echo "GOOGLE_CORE_AUTHORIZATION_REQUIRED: run Google Workspace Setup with service=core."
          fi

          if ${SSH} "sudo -u '${HERMES_USER}' test -f '${HERMES_CONFIG_DIR}/google_contacts_token.json'"; then
            ${SSH} "sudo -u '${HERMES_USER}' env \
              HOME='${HERMES_USER_HOME}' \
              HERMES_HOME='${HERMES_CONFIG_DIR}' \
              HERMES_CONFIG_DIR='${HERMES_CONFIG_DIR}' \
              /usr/bin/python3 '${ACTIVE_CONTACTS}' check"
            echo "GOOGLE_CONTACTS_READY: People API read/write access passed."
          else
            echo "GOOGLE_CONTACTS_AUTHORIZATION_REQUIRED: run Google Workspace Setup with service=contacts."
          fi

          if ${SSH} "sudo -u '${HERMES_USER}' test -f '${HERMES_CONFIG_DIR}/google_drive_token.json'"; then
            ${SSH} "sudo -u '${HERMES_USER}' env \
              HOME='${HERMES_USER_HOME}' \
              HERMES_HOME='${HERMES_CONFIG_DIR}' \
              HERMES_CONFIG_DIR='${HERMES_CONFIG_DIR}' \
              /usr/bin/python3 '${ACTIVE_DRIVE}' workspace ensure"
            ${SSH} "sudo -u '${HERMES_USER}' env \
              HOME='${HERMES_USER_HOME}' \
              HERMES_HOME='${HERMES_CONFIG_DIR}' \
              HERMES_CONFIG_DIR='${HERMES_CONFIG_DIR}' \
              /usr/bin/python3 '${ACTIVE_DRIVE}' workspace status"
            echo "GOOGLE_DRIVE_FOLDER_READY: Drive, Docs, and Sheets are restricted to hermes."
          else
            echo "GOOGLE_DRIVE_AUTHORIZATION_REQUIRED: run Google Workspace Setup with service=drive."
          fi

      - name: Remove temporary VM files
        if: always() && steps.ssh.outcome == 'success'
        run: |
          set -euo pipefail
          # shellcheck disable=SC1090
          source "${{ steps.ssh.outputs.env_file }}"
          SSH="ssh -i ${SSH_KEY} -p ${SSH_PORT} ${SSH_OPTS} ${SSH_USER}@localhost"
          ${SSH} 'sudo rm -rf /tmp/hermes-google-runtime' || true

      - name: Tear down ephemeral SSH
        if: always()
        env:
          VM_NAME: ${{ steps.cfg.outputs.vm_name }}
          ZONE: ${{ steps.cfg.outputs.zone }}
          PROJECT_ID: ${{ steps.cfg.outputs.project_id }}
        run: scripts/ssh-iap.sh down || true
