name: Google Drive Workspace OAuth

# Browser-only authorization for Drive, Docs, and Sheets. The token contains
# only drive.file and the runtime operates only inside the app-owned hermes folder.
on:
  workflow_dispatch:
    inputs:
      action:
        description: "Drive workspace OAuth operation"
        type: choice
        options:
          - provision-client
          - send-auth-link
          - exchange-callback
          - check
          - revoke
        default: check

permissions:
  contents: read

concurrency:
  group: hermes-infra
  cancel-in-progress: false

jobs:
  drive-workspace:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Resolve configuration
        id: cfg
        run: |
          set -euo pipefail
          PROJECT_ID="${{ vars.GCP_PROJECT_ID }}"
          if [ -z "${PROJECT_ID}" ]; then
            PROJECT_ID="$(jq -r '.project_id' "${GOOGLE_APPLICATION_CREDENTIALS}")"
          fi
          [ -n "${PROJECT_ID}" ] && [ "${PROJECT_ID}" != "null" ] || { echo "Could not resolve project_id"; exit 1; }

          ZONE="${{ vars.GCP_ZONE }}";            ZONE="${ZONE:-us-central1-a}"
          VM_NAME="${{ vars.GCP_VM_NAME }}";      VM_NAME="${VM_NAME:-hermes-agent}"
          HERMES_USER="${{ vars.HERMES_USER }}";  HERMES_USER="${HERMES_USER:-hermes}"
          HERMES_USER_HOME="${{ vars.HERMES_HOME }}"; HERMES_USER_HOME="${HERMES_USER_HOME:-/home/hermes}"

          {
            echo "project_id=${PROJECT_ID}"
            echo "zone=${ZONE}"
            echo "vm_name=${VM_NAME}"
            echo "hermes_user=${HERMES_USER}"
            echo "hermes_user_home=${HERMES_USER_HOME}"
            echo "hermes_config_dir=${HERMES_USER_HOME}/.hermes"
          } >> "${GITHUB_OUTPUT}"

      - name: Enable Drive, Docs, and Sheets APIs
        run: |
          set -euo pipefail
          gcloud services enable \
            drive.googleapis.com \
            docs.googleapis.com \
            sheets.googleapis.com \
            --project="${{ steps.cfg.outputs.project_id }}"

      - name: Prepare OAuth Desktop client
        if: inputs.action == 'provision-client'
        id: client
        env:
          GOOGLE_OAUTH_CLIENT_JSON: ${{ secrets.GOOGLE_OAUTH_CLIENT_JSON }}
        run: |
          set -euo pipefail
          [ -n "${GOOGLE_OAUTH_CLIENT_JSON}" ] || { echo "Missing GOOGLE_OAUTH_CLIENT_JSON secret" >&2; exit 1; }
          CLIENT_DIR="${RUNNER_TEMP}/hermes-google-drive"
          CLIENT_FILE="${CLIENT_DIR}/google-client.json"
          install -d -m 0700 "${CLIENT_DIR}"
          printf '%s' "${GOOGLE_OAUTH_CLIENT_JSON}" > "${CLIENT_FILE}"
          chmod 0600 "${CLIENT_FILE}"
          jq -e '.installed.client_id and .installed.client_secret' "${CLIENT_FILE}" >/dev/null
          echo "client_file=${CLIENT_FILE}" >> "${GITHUB_OUTPUT}"

      - name: Establish ephemeral SSH over IAP
        id: ssh
        env:
          VM_NAME: ${{ steps.cfg.outputs.vm_name }}
          ZONE: ${{ steps.cfg.outputs.zone }}
          PROJECT_ID: ${{ steps.cfg.outputs.project_id }}
        run: |
          set -euo pipefail
          chmod +x scripts/*.sh
          ENV_FILE="$(scripts/ssh-iap.sh up)"
          echo "env_file=${ENV_FILE}" >> "${GITHUB_OUTPUT}"

      - name: Install Drive workspace runtime
        env:
          ACTION: ${{ inputs.action }}
          HERMES_USER: ${{ steps.cfg.outputs.hermes_user }}
          HERMES_USER_HOME: ${{ steps.cfg.outputs.hermes_user_home }}
          HERMES_CONFIG_DIR: ${{ steps.cfg.outputs.hermes_config_dir }}
          CLIENT_FILE: ${{ steps.client.outputs.client_file }}
        run: |
          set -euo pipefail
          # shellcheck disable=SC1090
          source "${{ steps.ssh.outputs.env_file }}"
          SSH="ssh -i ${SSH_KEY} -p ${SSH_PORT} ${SSH_OPTS} ${SSH_USER}@localhost"
          SCP="scp -i ${SSH_KEY} -P ${SSH_PORT} ${SSH_OPTS}"

          for i in $(seq 1 30); do
            if ${SSH} true 2>/dev/null; then break; fi
            [ "${i}" = "30" ] && { echo "VM SSH not ready"; exit 1; }
            sleep 5
          done

          ${SSH} 'rm -rf /tmp/hermes-google-drive && mkdir -p -m 0700 /tmp/hermes-google-drive/google-workspace-skill'
          ${SCP} scripts/google-workspace-oauth.py \
                 scripts/google-workspace-api.py \
                 scripts/google-drive-oauth.py \
                 scripts/google-drive-workspace.py \
                 scripts/hermes-google-workspace.sh \
                 scripts/hermes-google-api.sh \
                 scripts/hermes-google-drive.sh \
                 scripts/install-google-workspace.sh \
                 "${SSH_USER}@localhost:/tmp/hermes-google-drive/"
          ${SCP} skills/google-workspace/SKILL.md \
                 "${SSH_USER}@localhost:/tmp/hermes-google-drive/google-workspace-skill/SKILL.md"

          CLIENT_SOURCE=""
          if [ "${ACTION}" = "provision-client" ]; then
            [ -f "${CLIENT_FILE}" ] || { echo "Prepared OAuth client is missing" >&2; exit 1; }
            ${SCP} "${CLIENT_FILE}" "${SSH_USER}@localhost:/tmp/hermes-google-drive/google-client.json"
            CLIENT_SOURCE="/tmp/hermes-google-drive/google-client.json"
          fi

          ${SSH} "sudo env \
            HERMES_USER='${HERMES_USER}' \
            HERMES_USER_HOME='${HERMES_USER_HOME}' \
            HERMES_CONFIG_DIR='${HERMES_CONFIG_DIR}' \
            CLIENT_SECRET_SOURCE='${CLIENT_SOURCE}' \
            SKILL_SOURCE='/tmp/hermes-google-drive/google-workspace-skill/SKILL.md' \
            API_SOURCE='/tmp/hermes-google-drive/google-workspace-api.py' \
            DRIVE_SOURCE='/tmp/hermes-google-drive/google-drive-workspace.py' \
            DRIVE_OAUTH_SOURCE='/tmp/hermes-google-drive/google-drive-oauth.py' \
            bash /tmp/hermes-google-drive/install-google-workspace.sh"

      - name: Run selected Drive OAuth operation
        env:
          ACTION: ${{ inputs.action }}
          HERMES_USER: ${{ steps.cfg.outputs.hermes_user }}
          HERMES_USER_HOME: ${{ steps.cfg.outputs.hermes_user_home }}
          HERMES_CONFIG_DIR: ${{ steps.cfg.outputs.hermes_config_dir }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          GOOGLE_OAUTH_TELEGRAM_CHAT_ID: ${{ vars.GOOGLE_OAUTH_TELEGRAM_CHAT_ID || secrets.GOOGLE_OAUTH_TELEGRAM_CHAT_ID }}
          TELEGRAM_ALLOWED_USERS: ${{ vars.TELEGRAM_ALLOWED_USERS || secrets.TELEGRAM_ALLOWED_USERS }}
          GOOGLE_DRIVE_OAUTH_CALLBACK_URL: ${{ secrets.GOOGLE_DRIVE_OAUTH_CALLBACK_URL }}
        run: |
          set -euo pipefail
          # shellcheck disable=SC1090
          source "${{ steps.ssh.outputs.env_file }}"
          SSH="ssh -i ${SSH_KEY} -p ${SSH_PORT} ${SSH_OPTS} ${SSH_USER}@localhost"
          ENV="sudo -u '${HERMES_USER}' env HOME='${HERMES_USER_HOME}' HERMES_HOME='${HERMES_CONFIG_DIR}' HERMES_CONFIG_DIR='${HERMES_CONFIG_DIR}'"
          OAUTH="${ENV} /usr/bin/python3 /usr/local/lib/hermes/google-drive-oauth.py"
          DRIVE="${ENV} /usr/local/bin/hermes-google-drive"

          case "${ACTION}" in
            provision-client)
              ${SSH} "${OAUTH} paths"
              echo "Drive OAuth client and folder-bound runtime installed."
              ;;
            send-auth-link)
              [ -n "${TELEGRAM_BOT_TOKEN}" ] || { echo "TELEGRAM_BOT_TOKEN is required" >&2; exit 1; }
              RAW_CHAT_ID="${GOOGLE_OAUTH_TELEGRAM_CHAT_ID:-${TELEGRAM_ALLOWED_USERS}}"
              CHAT_ID="$(printf '%s' "${RAW_CHAT_ID}" | cut -d, -f1 | tr -d '[:space:]')"
              [[ "${CHAT_ID}" =~ ^-?[0-9]+$ ]] || { echo "Set a numeric Telegram chat/user ID" >&2; exit 1; }
              AUTH_URL="$(${SSH} "${OAUTH} auth-url")"
              AUTH_URL="${AUTH_URL//$'\r'/}"
              [[ "${AUTH_URL}" == https://accounts.google.com/* ]] || { echo "VM returned an invalid authorization URL" >&2; exit 1; }
              echo "::add-mask::${AUTH_URL}"
              MESSAGE=$'Hermes Drive workspace authorization\n\nThis grants only per-file access. Hermes will create and use one folder named hermes. The final 127.0.0.1 page is expected to fail; copy the complete URL afterward.\n\n'
              MESSAGE+="${AUTH_URL}"
              curl -fsS --retry 3 --connect-timeout 15 \
                -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
                --data-urlencode "chat_id=${CHAT_ID}" \
                --data-urlencode "disable_web_page_preview=true" \
                --data-urlencode "text=${MESSAGE}" \
                -o /dev/null
              echo "Drive authorization URL sent privately through Telegram."
              ;;
            exchange-callback)
              [ -n "${GOOGLE_DRIVE_OAUTH_CALLBACK_URL}" ] || { echo "Set temporary GOOGLE_DRIVE_OAUTH_CALLBACK_URL secret" >&2; exit 1; }
              printf '%s' "${GOOGLE_DRIVE_OAUTH_CALLBACK_URL}" | base64 -w0 | \
                ${SSH} "base64 -d | ${OAUTH} auth-code-stdin"
              ${SSH} "${OAUTH} check"
              ${SSH} "${DRIVE} workspace ensure"
              ${SSH} "${DRIVE} workspace status"
              echo "DRIVE_WORKSPACE_AUTHENTICATED: app-owned hermes folder is ready."
              ;;
            check)
              ${SSH} "${OAUTH} check"
              ${SSH} "${DRIVE} workspace status"
              echo "DRIVE_WORKSPACE_READY: Drive, Docs, and Sheets are restricted to hermes."
              ;;
            revoke)
              ${SSH} "${OAUTH} revoke"
              echo "Drive workspace token revoked. Existing files remain in Drive."
              ;;
            *)
              echo "Unsupported action: ${ACTION}" >&2
              exit 2
              ;;
          esac

      - name: Remove temporary VM files
        if: always() && steps.ssh.outcome == 'success'
        run: |
          set -euo pipefail
          # shellcheck disable=SC1090
          source "${{ steps.ssh.outputs.env_file }}"
          SSH="ssh -i ${SSH_KEY} -p ${SSH_PORT} ${SSH_OPTS} ${SSH_USER}@localhost"
          ${SSH} 'rm -rf /tmp/hermes-google-drive' || true

      - name: Tear down ephemeral SSH
        if: always()
        env:
          VM_NAME: ${{ steps.cfg.outputs.vm_name }}
          ZONE: ${{ steps.cfg.outputs.zone }}
          PROJECT_ID: ${{ steps.cfg.outputs.project_id }}
        run: scripts/ssh-iap.sh down || true

      - name: Clean runner secrets
        if: always()
        run: rm -rf "${RUNNER_TEMP}/hermes-google-drive" || true
